# Example GitHub Actions workflow that runs wimsalabim against your domain
# and uploads the SARIF report to GitHub Code Scanning.
#
# Place at: .github/workflows/wimsalabim-scan.yml

name: wimsalabim-scan

on:
  schedule:
    # Daily at 03:00 UTC — quiet hours.
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required to upload SARIF

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install wimsalabim
        run: pipx install wimsalabim

      - name: Scan
        run: |
          wimsalabim scan ${{ vars.TARGET_DOMAIN }} \
            --auth-self-owned ./security/owned-domains.txt \
            --enable dns_recon --enable tls --enable headers \
            --format sarif -o sarif.json

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif.json
          category: wimsalabim
